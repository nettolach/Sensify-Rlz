<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensify RLZ</title>

<style>
body {
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

select, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    background: orange;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.resultado {
    margin-top: 20px;
    font-size: 18px;
    color: #00ffc8;
    animation: aparecer 0.4s ease-in-out;
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.copy-btn {
    background: #00ffc8;
    margin-top: 10px;
}
.social {
    margin-top: 30px;
}
a {
    color: orange;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 SENSIFY RLZ 🔥</h1>

<select id="tipo">
    <option>Alta</option>
    <option>Media</option>
    <option>Baixa</option>
</select>

<button onclick="gerar()">Gerar Sensibilidade</button>

<div id="resultado"></div>

<div class="social">
    <p>📸 Instagram: <a href="https://instagram.com/rlz.netto" target="_blank">@rlz.netto</a></p>
    <p>🎵 TikTok: <a href="https://tiktok.com/@nero_doidao" target="_blank">@nero_doidao</a></p>
</div>

<p style="margin-top:20px;">👥 Visitas: <span id="contador">Carregando...</span></p>

</div>

<script>
function gerar() {

    const tipo = document.getElementById("tipo").value;
    let base;

    if (tipo === "Alta") {
        base = Math.floor(Math.random() * 15) + 80;
    } else if (tipo === "Media") {
        base = Math.floor(Math.random() * 15) + 60;
    } else {
        base = Math.floor(Math.random() * 15) + 40;
    }

    const geral = base;
    const vermelho = base - 5;
    const mira2x = base - 10;
    const mira4x = base - 15;
    const awm = base - 20;
    const olhadinha = base - 3;

    const texto = `
    🎯 Geral: ${geral}
    🔴 Ponto Vermelho: ${vermelho}
    🔭 2x: ${mira2x}
    🔭 4x: ${mira4x}
    🎯 AWM: ${awm}
    👀 Olhadinha: ${olhadinha}
    `;

    document.getElementById("resultado").innerHTML = `
        <div class="resultado">
            ${texto.replace(/\n/g,"<br>")}
            <button class="copy-btn" onclick="copiar(\`${texto}\`)">Copiar Sensibilidade</button>
        </div>
    `;
}

function copiar(texto) {
    navigator.clipboard.writeText(texto);
    alert("Sensibilidade copiada!");
}

/* CONTADOR REAL */
fetch("https://api.countapi.xyz/hit/sensify-rlz/visitas")
.then(res => res.json())
.then(data => {
    document.getElementById("contador").innerText = data.value;
});
</script>

</body>
</html>
