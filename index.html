<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensify RLZ</title>

<style>
body{
background:#000;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:450px;
margin:auto;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 25px rgba(255,140,0,0.4);
}

h1{
color:orange;
text-shadow:0 0 15px orange;
}

select,input,button,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:none;
font-size:15px;
}

button{
background:linear-gradient(45deg,orange,gold);
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.03);
}

.resultado{
margin-top:15px;
color:#00ffc8;
animation:fade 0.4s ease-in-out;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.stars span{
font-size:25px;
cursor:pointer;
color:gray;
}

.stars span.active{
color:gold;
}

footer{
margin-top:20px;
font-size:13px;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 SENSIFY RLZ 🔥</h1>

<div class="card">

<select id="marca" onchange="atualizarModelos()">
<option>Samsung</option>
<option>Xiaomi</option>
<option>Motorola</option>
<option>iPhone</option>
</select>

<select id="modelo"></select>

<select id="tipo">
<option>Alta</option>
<option>Media</option>
<option>Baixa</option>
</select>

<button onclick="gerar()">Gerar Sensibilidade Inteligente</button>
<button onclick="premium()">Sensi Premium 🔐</button>

<div id="resultado"></div>

</div>

<div class="card">

<h3>⭐ Avaliação</h3>

<div class="stars" id="stars">
<span onclick="avaliar(1)">★</span>
<span onclick="avaliar(2)">★</span>
<span onclick="avaliar(3)">★</span>
<span onclick="avaliar(4)">★</span>
<span onclick="avaliar(5)">★</span>
</div>

<textarea placeholder="Deixe uma mensagem..."></textarea>

</div>

<footer>
© 2026 Sensify RLZ - Todos os direitos reservados
</footer>

</div>

<script>

const modelos={
Samsung:["Galaxy A01","Galaxy A02","Galaxy A03","Galaxy A10","Galaxy A10e","Galaxy A11","Galaxy A12","Galaxy A20","Galaxy A20s","Galaxy A21","Galaxy A21s","Galaxy A22","Galaxy A30","Galaxy A30s","Galaxy A31","Galaxy A32","Galaxy A40","Galaxy A41","Galaxy A50","Galaxy A50s","Galaxy A51","Galaxy A52","Galaxy A60","Galaxy A70","Galaxy A70s","Galaxy A71","Galaxy A72","Galaxy A80","Galaxy A90","Galaxy S8","Galaxy S9","Galaxy S10","Galaxy S10e","Galaxy S10+","Galaxy S20","Galaxy S20+","Galaxy S20 Ultra","Galaxy S21","Galaxy S21+","Galaxy S21 Ultra","Galaxy S22","Galaxy S22+","Galaxy S22 Ultra","Galaxy S23","Galaxy S23+","Galaxy S23 Ultra","Galaxy Z Flip","Galaxy Z Flip 3","Galaxy Z Fold","Galaxy Z Fold 2","Galaxy Z Fold 3"],
Xiaomi:["Redmi 7","Redmi 8","Redmi 8A","Redmi 9","Redmi 9A","Redmi 9C","Redmi 9T","Redmi 10","Redmi 10A","Redmi 10C","Redmi 12","Redmi Note 7","Redmi Note 8","Redmi Note 8 Pro","Redmi Note 9","Redmi Note 9S","Redmi Note 9 Pro","Redmi Note 10","Redmi Note 10S","Redmi Note 10 Pro","Redmi Note 11","Redmi Note 11S","Redmi Note 11 Pro","Redmi Note 12","Redmi Note 12 Pro","Redmi Note 13","Redmi Note 13 Pro","Poco F1","Poco F2 Pro","Poco F3","Poco F4","Poco F5","Poco X3 NFC","Poco X3 Pro","Poco X4 Pro","Poco X5","Poco X5 Pro","Poco M3","Poco M4 Pro","Mi 9","Mi 10","Mi 10T","Mi 11","Mi 11 Lite","Mi 12","Mi 12 Lite","Mi 13","Xiaomi 11T","Xiaomi 12T","Xiaomi 13T"],
Motorola:["Moto E5","Moto E5 Play","Moto E6","Moto E6 Play","Moto E7","Moto E7 Plus","Moto E13","Moto E20","Moto E22","Moto E22i","Moto G6","Moto G6 Play","Moto G7","Moto G7 Play","Moto G7 Power","Moto G8","Moto G8 Play","Moto G8 Power","Moto G9","Moto G9 Play","Moto G9 Power","Moto G10","Moto G20","Moto G30","Moto G31","Moto G41","Moto G42","Moto G50","Moto G51","Moto G52","Moto G53","Moto G54","Moto G60","Moto G62","Moto G71","Moto G72","Moto G73","Moto G82","Moto G84","Moto One","Moto One Fusion","Moto One Hyper","Moto One Vision","Moto Edge","Moto Edge 20","Moto Edge 20 Lite","Moto Edge 30","Moto Edge 30 Neo","Moto Edge 40","Moto Edge 40 Neo"],
iPhone:["iPhone 6s","iPhone 6s Plus","iPhone SE (1ª geração)","iPhone 7","iPhone 7 Plus","iPhone 8","iPhone 8 Plus","iPhone X","iPhone XR","iPhone XS","iPhone XS Max","iPhone 11","iPhone 11 Pro","iPhone 11 Pro Max","iPhone SE (2ª geração)","iPhone 12 mini","iPhone 12","iPhone 12 Pro","iPhone 12 Pro Max","iPhone 13 mini","iPhone 13","iPhone 13 Pro","iPhone 13 Pro Max","iPhone SE (3ª geração)","iPhone 14","iPhone 14 Plus","iPhone 14 Pro","iPhone 14 Pro Max","iPhone 15","iPhone 15 Plus","iPhone 15 Pro","iPhone 15 Pro Max"]
};

function atualizarModelos(){
let marca=document.getElementById("marca").value;
let modeloSelect=document.getElementById("modelo");
modeloSelect.innerHTML="";
modelos[marca].forEach(m=>{
let opt=document.createElement("option");
opt.textContent=m;
modeloSelect.appendChild(opt);
});
}
atualizarModelos();

function gerar(){

let tipo=document.getElementById("tipo").value;

let base;

if(tipo==="Alta") base=140+Math.floor(Math.random()*61); // 140–200
else if(tipo==="Media") base=90+Math.floor(Math.random()*50); // 90–139
else base=40+Math.floor(Math.random()*50); // 40–89

let dpi=300+Math.floor(Math.random()*200);

let resultado=`
🎯 Geral: ${base}
🔴 Ponto Vermelho: ${base-5}
🔭 2x: ${base-10}
🔭 4x: ${base-15}
🎯 AWM: ${base-20}
👀 Olhadinha: ${base-3}

🧠 DPI Recomendada: ${dpi}
`;

document.getElementById("resultado").innerHTML=
`<div class="resultado">
${resultado.replace(/\n/g,"<br>")}
<button onclick="copiar(\`${resultado}\`)">Copiar</button>
</div>`;
}

function premium(){

let senha=prompt("Digite a senha Premium:");

if(senha==="Nero2026"){

let tipo=document.getElementById("tipo").value;
let base;

if(tipo==="Alta") base=170+Math.floor(Math.random()*31); // 170–200
else if(tipo==="Media") base=120+Math.floor(Math.random()*30); // 120–149
else base=70+Math.floor(Math.random()*30); // 70–99
  
let dpi=450+Math.floor(Math.random()*150);
let botao=45+Math.floor(Math.random()*10);

let resultado=`
🔥 SENSI PREMIUM 🔥

🎯 Geral: ${base}
🔴 Ponto Vermelho: ${base-3}
🔭 2x: ${base-6}
🔭 4x: ${base-9}
🎯 AWM: ${base-12}
👀 Olhadinha: ${base-2}

🧠 DPI Personalizada: ${dpi}
🎮 Tamanho do Botão: ${botao}%

⚡ Ajuste fino para movimentação rápida
⚡ Ideal para HS consistente
⚡ Melhor resposta em dispositivos médios
`;

document.getElementById("resultado").innerHTML=
`<div class="resultado">
${resultado.replace(/\n/g,"<br>")}
<button onclick="copiar(\`${resultado}\`)">Copiar Premium</button>
</div>`;

}else{
alert("Senha incorreta!");
}
}

function copiar(texto){
navigator.clipboard.writeText(texto);
alert("Copiado!");
}

function avaliar(n){
let stars=document.querySelectorAll("#stars span");
stars.forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
localStorage.setItem("avaliacao",n);
}

let saved=localStorage.getItem("avaliacao");
if(saved) avaliar(saved);

</script>
  
<div style="margin-top:30px; text-align:center;">
  <p>📸 Instagram: 
    <a href="https://instagram.com/rlz.netto" target="_blank" style="color:orange;">
      @rlz.netto
    </a>
  </p>

    <a href="https://tiktok.com/@nero_doidao" target="_blank" style="color:orange;">
      @nero_doidao
    </a>
  </p>
</div>
  
</body>
</html>
