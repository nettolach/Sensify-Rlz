<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador RLZ Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#000);
    color:white;
}

.container{
    max-width:950px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#ff9900;
}

.card{
    background:#1b1b1b;
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
    box-shadow:0 0 20px black;
}

select,input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#ff9900;
    font-weight:bold;
    cursor:pointer;
}

.resultado{
    margin-top:15px;
    background:#111;
    padding:15px;
    border-radius:10px;
}

footer{
    text-align:center;
    margin-top:30px;
    font-size:14px;
    color:#aaa;
}
</style>
</head>
<body>

<div class="container">

<h1>🔥 GERADOR RLZ SENSI PRO 🔥</h1>

<div class="card">
<h2>📱 Marca e Modelo</h2>

<select id="marca" onchange="carregarModelos()">
<option value="">Selecione a Marca</option>
<option value="Apple">Apple</option>
<option value="Samsung">Samsung</option>
<option value="Xiaomi">Xiaomi</option>
<option value="Motorola">Motorola</option>
<option value="Realme">Realme</option>
</select>

<select id="modelo">
<option>Selecione o Modelo</option>
</select>

<input type="number" id="dpiInput" placeholder="Digite sua DPI (490 a 980)">
</div>

<div class="card">
<h2>🎯 Tipo de Sensibilidade</h2>

<select id="tipoSensi">
<option value="">Escolha o Tipo</option>
<option value="baixa">Baixa (0 - 100)</option>
<option value="media">Média (50 - 150)</option>
<option value="alta">Alta (100 - 200)</option>
</select>

<button onclick="gerarSensi()">Gerar Sensibilidade</button>

<div class="resultado" id="resultado"></div>
</div>

<div class="card">
<h2>⭐ Avaliações</h2>
<button onclick="avaliar()">Avaliar</button>
<p>Total de Avaliações: <span id="totalAval"></span></p>
</div>

<footer>
📊 Visitas: <span id="visitas"></span><br>
📸 Instagram: @rlz.netto<br>
🎵 TikTok: @nero_doidao<br>
© 2026 RLZ NETTO
</footer>

</div>

<script>

const modelos = {
Apple:["iPhone 11","iPhone 12","iPhone 13","iPhone 14","iPhone 15"],
Samsung:["Galaxy S20","Galaxy S21","Galaxy S22","Galaxy S23","Galaxy S24"],
Xiaomi:["Redmi Note 10","Note 11","Note 12","Poco X5","Poco X6"],
Motorola:["Moto G60","G73","Edge 30","Edge 40"],
Realme:["Realme 9","Realme 10","C55"]
};

function carregarModelos(){
let marca = document.getElementById("marca").value;
let modeloSelect = document.getElementById("modelo");
modeloSelect.innerHTML="<option>Selecione o Modelo</option>";

if(modelos[marca]){
modelos[marca].forEach(function(m){
let opt=document.createElement("option");
opt.value=m;
opt.innerHTML=m;
modeloSelect.appendChild(opt);
});
}
}

function gerarNumero(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function gerarSensi(){

let tipo=document.getElementById("tipoSensi").value;
let dpi=document.getElementById("dpiInput").value;
let resultado=document.getElementById("resultado");

if(!tipo || !dpi){
resultado.innerHTML="Preencha todas as informações!";
return;
}

let min,max;

if(tipo=="baixa"){min=0;max=100;}
if(tipo=="media"){min=50;max=150;}
if(tipo=="alta"){min=100;max=200;}

let geral=gerarNumero(min,max);
let red=gerarNumero(min,max);
let x2=gerarNumero(min,max);
let x4=gerarNumero(min,max);
let awm=gerarNumero(min,max);
let camera=gerarNumero(min,max);

resultado.innerHTML=`
<h3>📊 Sua Sensibilidade</h3>
Geral: ${geral}<br>
Ponto Vermelho: ${red}<br>
2x: ${x2}<br>
4x: ${x4}<br>
AWM: ${awm}<br>
Botão Câmera Livre: ${camera}<br><br>
🔥 DPI recomendada para sua Sensibilidade: ${gerarNumero(490,980)}
`;
}

if(localStorage.visitas){
localStorage.visitas=Number(localStorage.visitas)+1;
}else{
localStorage.visitas=1;
}
document.getElementById("visitas").innerText=localStorage.visitas;

if(localStorage.avaliacoes){
document.getElementById("totalAval").innerText=localStorage.avaliacoes;
}else{
localStorage.avaliacoes=0;
document.getElementById("totalAval").innerText=0;
}

function avaliar(){
localStorage.avaliacoes=Number(localStorage.avaliacoes)+1;
document.getElementById("totalAval").innerText=localStorage.avaliacoes;
}

</script>

</body>
</html>
