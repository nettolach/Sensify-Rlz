<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensify RLZ</title>

<style>
body{
background:#000;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:450px;
margin:auto;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 25px rgba(255,140,0,0.4);
}

h1{
color:orange;
text-shadow:0 0 15px orange;
}

select,input,button,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:none;
font-size:15px;
}

button{
background:linear-gradient(45deg,orange,gold);
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.03);
}

.resultado{
margin-top:15px;
color:#00ffc8;
animation:fade 0.4s ease-in-out;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.stars span{
font-size:25px;
cursor:pointer;
color:gray;
}

.stars span.active{
color:gold;
}

footer{
margin-top:20px;
font-size:13px;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 SENSIFY RLZ 🔥</h1>

<div class="card">

<select id="marca" onchange="atualizarModelos()">
<option>Samsung</option>
<option>Xiaomi</option>
<option>Motorola</option>
<option>iPhone</option>
</select>

<select id="modelo"></select>

<select id="tipo">
<option>Alta</option>
<option>Media</option>
<option>Baixa</option>
</select>

<button onclick="gerar()">Gerar Sensibilidade Inteligente</button>
<button onclick="premium()">Sensi Premium 🔐</button>

<div id="resultado"></div>

</div>

<div class="card">

<h3>⭐ Avaliação</h3>

<div class="stars" id="stars">
<span onclick="avaliar(1)">★</span>
<span onclick="avaliar(2)">★</span>
<span onclick="avaliar(3)">★</span>
<span onclick="avaliar(4)">★</span>
<span onclick="avaliar(5)">★</span>
</div>

<textarea placeholder="Deixe uma mensagem..."></textarea>

</div>

<footer>
© 2026 Sensify RLZ - Todos os direitos reservados
</footer>

</div>

<script>

const modelos={
Samsung:["Galaxy A14","Galaxy A34","Galaxy S20","Galaxy S21","Galaxy S23"],
Xiaomi:["Redmi Note 8","Redmi Note 10","Poco X3","Poco X5"],
Motorola:["Moto G20","Moto G60","Edge 20"],
iPhone:["iPhone 11","iPhone 12","iPhone 13","iPhone 14"]
};

function atualizarModelos(){
let marca=document.getElementById("marca").value;
let modeloSelect=document.getElementById("modelo");
modeloSelect.innerHTML="";
modelos[marca].forEach(m=>{
let opt=document.createElement("option");
opt.textContent=m;
modeloSelect.appendChild(opt);
});
}
atualizarModelos();

function gerar(){

let tipo=document.getElementById("tipo").value;

let base;

if(tipo==="Alta") base=85+Math.floor(Math.random()*10);
else if(tipo==="Media") base=65+Math.floor(Math.random()*15);
else base=40+Math.floor(Math.random()*20);

let dpi=300+Math.floor(Math.random()*200);

let resultado=`
🎯 Geral: ${base}
🔴 Ponto Vermelho: ${base-5}
🔭 2x: ${base-10}
🔭 4x: ${base-15}
🎯 AWM: ${base-20}
👀 Olhadinha: ${base-3}

🧠 DPI Recomendada: ${dpi}
`;

document.getElementById("resultado").innerHTML=
`<div class="resultado">
${resultado.replace(/\n/g,"<br>")}
<button onclick="copiar(\`${resultado}\`)">Copiar</button>
</div>`;
}

function premium(){

let senha=prompt("Digite a senha Premium:");

if(senha==="Nero2026"){

let base=90+Math.floor(Math.random()*5);
let dpi=450+Math.floor(Math.random()*150);
let botao=45+Math.floor(Math.random()*10);

let resultado=`
🔥 SENSI PREMIUM 🔥

🎯 Geral: ${base}
🔴 Ponto Vermelho: ${base-3}
🔭 2x: ${base-6}
🔭 4x: ${base-9}
🎯 AWM: ${base-12}
👀 Olhadinha: ${base-2}

🧠 DPI Personalizada: ${dpi}
🎮 Tamanho do Botão: ${botao}%

⚡ Ajuste fino para movimentação rápida
⚡ Ideal para HS consistente
⚡ Melhor resposta em dispositivos médios
`;

document.getElementById("resultado").innerHTML=
`<div class="resultado">
${resultado.replace(/\n/g,"<br>")}
<button onclick="copiar(\`${resultado}\`)">Copiar Premium</button>
</div>`;

}else{
alert("Senha incorreta!");
}
}

function copiar(texto){
navigator.clipboard.writeText(texto);
alert("Copiado!");
}

function avaliar(n){
let stars=document.querySelectorAll("#stars span");
stars.forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
localStorage.setItem("avaliacao",n);
}

let saved=localStorage.getItem("avaliacao");
if(saved) avaliar(saved);

</script>

</body>
</html>
